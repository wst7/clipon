<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#6D28D9"/>
    </linearGradient>
    <linearGradient id="lightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- 背景：圆角矩形，紫色渐变 -->
  <rect x="24" y="16" width="80" height="96" rx="16" fill="url(#purpleGrad)"/>

  <!-- 顶部钉子/夹子 -->
  <rect x="49" y="10" width="30" height="12" rx="4" fill="#5B21B6"/>
  <rect x="54" y="4" width="20" height="10" rx="3" fill="#5B21B6"/>

  <!-- 纸张区域 -->
  <rect x="34" y="36" width="60" height="64" rx="8" fill="#FFFFFF"/>

  <!-- 纸张上的内容 - 剪贴内容示意 -->
  <!-- 第一行 -->
  <rect x="44" y="48" width="32" height="6" rx="3" fill="#E9D5FF"/>
  <!-- 第二行 -->
  <rect x="44" y="60" width="40" height="6" rx="3" fill="#DDD6FE"/>
  <!-- 第三行 -->
  <rect x="44" y="72" width="24" height="6" rx="3" fill="#E9D5FF"/>
  <!-- 第四行 -->
  <rect x="44" y="84" width="36" height="6" rx="3" fill="#DDD6FE"/>

  <!-- 底部阴影效果 -->
  <rect x="34" y="94" width="60" height="6" rx="3" fill="#7C3AED" opacity="0.15"/>
</svg>